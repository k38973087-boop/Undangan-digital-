<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mitra Nusantara - Produk Investasi</title>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <style>
    /* --- RESET & BASE STYLE --- */
    body { 
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      background: #f4f7fa; 
      padding-bottom: 100px; 
      color: #333; 
      overflow-x: hidden; 
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* --- CUSTOM ALERT SYSTEM --- */
    #customAlert {
      display: none;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 61, 0, 0.95);
      color: white;
      padding: 12px 25px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: bold;
      z-index: 10000;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* --- TOP HEADER BANNER --- */
    .top-banner { 
      background: #1565C0;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
      padding: 30px 20px 40px 20px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .top-banner .left-info h1 { font-size: 22px; margin: 0; font-weight: 700; }
    .top-banner .left-info p { font-size: 13px; margin: 5px 0 0 0; opacity: 0.8; }

    .top-banner .right-balance { text-align: right; }
    .top-banner .right-balance p { font-size: 11px; margin: 0; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.9; }
    .top-banner .right-balance .balance-row { display: flex; align-items: center; justify-content: flex-end; gap: 5px; margin-top: 5px; }
    .top-banner .right-balance h2 { font-size: 22px; margin: 0; font-weight: 700; }
    .top-banner .right-balance .eye-icon { font-size: 16px; cursor: pointer; opacity: 0.8; }

    /* --- FILTER CATEGORY TABS --- */
    .category-container {
      overflow-x: auto;
      white-space: nowrap;
      padding: 15px 20px;
      margin-top: -15px;
      display: flex;
      gap: 10px;
    }
    .category-container::-webkit-scrollbar { display: none; }
    
    .tab-btn {
      background: white;
      color: #666;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      cursor: pointer;
    }
    .tab-btn.active {
      background: #00E676;
      color: white;
      background-image: linear-gradient(135deg, #0091EA, #00b0ff);
    }

    /* --- SUMMARY INVESTMENT PORTFOLIO CARD --- */
    .summary-card {
      background: #0D47A1;
      margin: 0 20px 20px 20px;
      border-radius: 16px;
      padding: 20px;
      color: white;
      display: flex;
      box-shadow: 0 8px 20px rgba(13, 71, 161, 0.2);
    }
    .summary-box { flex: 1; text-align: center; }
    .summary-box:first-child { border-right: 1px solid rgba(255, 255, 255, 0.15); }
    .summary-box p { margin: 0; font-size: 12px; opacity: 0.8; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .summary-box h3 { margin: 8px 0 0 0; font-size: 18px; font-weight: 700; }
    .summary-box h3.profit-text { color: #00E676; }

    /* --- SECTION TITLE --- */
    .section { padding: 0 20px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .section-header h3 { font-size: 15px; font-weight: 700; color: #444; margin: 0; }
    .btn-back { background: #1565C0; color: #fff; font-size: 11px; padding: 6px 12px; border-radius: 20px; cursor: pointer; display: none; font-weight: 600; }

    /* --- PRODUCT CARDS GRID & ITEMS --- */
    .reels-grid { display: flex; flex-direction: column; gap: 15px; }
    
    .reels-item { 
      background: white; 
      border-radius: 16px; 
      padding: 18px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.04); 
      display: flex; 
      flex-direction: column; 
      cursor: pointer;
      position: relative;
      border: 1px solid rgba(0,0,0,0.02);
    }
    .reels-item.locked {
      opacity: 0.6;
      pointer-events: none;
      filter: grayscale(0.8);
    }

    /* Card Layout Top Section */
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
    .card-meta { display: flex; gap: 12px; align-items: center; }
    
    /* Dynamic Image Replacement Placeholder */
    .brand-logo-container {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid #e1e8ed;
    }
    .brand-logo-container img { width: 80%; height: 80%; object-fit: contain; }

    .brand-details { display: flex; flex-direction: column; gap: 4px; }
    .badge-level { 
      background: #E3F2FD; 
      color: #1E88E5; 
      font-size: 10px; 
      padding: 3px 10px; 
      border-radius: 12px; 
      font-weight: 700; 
      width: fit-content;
    }
    .video-title { font-size: 16px; font-weight: 700; color: #222; margin: 0; }
    .card-subtitle { font-size: 12px; color: #888; margin: 0; }

    /* Inline Mini Vector Chart Graphic */
    .mini-chart { width: 65px; height: 35px; }

    /* Card Layout Row Parameters */
    .card-params { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 10px; 
      background: #f8fafc; 
      padding: 10px; 
      border-radius: 12px;
      margin-bottom: 15px;
    }
    .param-box { display: flex; align-items: center; gap: 8px; }
    .param-icon {
      width: 28px;
      height: 28px;
      background: #E8EAF6;
      color: #3F51B5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }
    .param-info { display: flex; flex-direction: column; }
    .param-info span:first-child { font-size: 10px; color: #888; }
    .param-info span:last-child { font-size: 12px; font-weight: 700; color: #333; }

    /* Card Layout Footer Row */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px dashed #e2e8f0;
      padding-top: 12px;
    }
    .total-profit-box { display: flex; flex-direction: column; gap: 2px; }
    .total-profit-box span:first-child { font-size: 11px; color: #888; }
    .total-profit-box span:last-child { font-size: 15px; font-weight: 700; color: #00C853; }

    .btn-invest {
      background: #1565C0;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(21, 101, 192, 0.2);
    }

    /* Accordion Detail Style */
    .accordion-toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #666;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #f1f5f9;
    }

    /* --- BOTTOM NAVIGATION BAR --- */
    .bottom-nav { 
      position: fixed; 
      bottom: 0; 
      width: 100%; 
      display: flex; 
      justify-content: space-around; 
      background: white; 
      padding: 10px 0 15px 0; 
      border-top: 1px solid #edf2f7; 
      z-index: 1000; 
      box-shadow: 0 -4px 20px rgba(0,0,0,0.03);
    }
    .bottom-nav a { text-decoration: none; color: #a0aec0; font-size: 11px; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; font-weight: 500; }
    .bottom-nav a .nav-icon { font-size: 20px; }
    .bottom-nav a.active { color: #1565C0; font-weight: 700; }
    
    /* Navigation Marker Line indicator */
    .bottom-nav a.active::after {
      content: '';
      width: 20px;
      height: 3px;
      background: #1565C0;
      border-radius: 2px;
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <div id="customAlert">Gagal! Level Anda tidak cukup.</div>

  <!-- TOP HEADER BANNER (SALDO TERSEDIA) -->
  <div class="top-banner">
    <div class="left-info">
      <h1>Produk Investasi</h1>
      <p>Pilih Produk investasi Anda</p>
    </div>
    <div class="right-balance">
      <p>Saldo Tersedia</p>
      <div class="balance-row">
        <h2 id="userBalanceText">Rp 0</h2>
        <span class="eye-icon" onclick="toggleBalanceVisibility()">👁️</span>
      </div>
    </div>
  </div>

  <!-- HORIZONTAL FILTER TABS CATEGORIES -->
  <div class="category-container">
    <button class="tab-btn active" onclick="filterCategory('semua')">Semua</button>
    <button class="tab-btn" onclick="filterCategory('dasar')">Mitra Dasar</button>
    <button class="tab-btn" onclick="filterCategory('plus')">Mitra Plus</button>
    <button class="tab-btn" onclick="filterCategory('premium')">Mitra Premium</button>
  </div>

  <!-- INVESTMENT ACCUMULATION SUMMARY PORTFOLIO CARD -->
  <div class="summary-card">
    <div class="summary-box">
      <p>📈 Total Investasi</p>
      <h3 id="totalInvestmentText">Rp 0</h3>
    </div>
    <div class="summary-box">
      <p>💲 Profit Harian</p>
      <h3 class="profit-text" id="dailyProfitText">Rp 0</h3>
    </div>
  </div>

  <!-- MAIN LIST TASK / INVESTMENT PRODUCTS SECTION -->
  <div class="section">
    <div class="section-header">
      <h3 id="sectionTitle">TUGAS KEMITRAAN</h3>
      <span class="btn-back" id="btnBack" onclick="renderLevelCards()">Kembali</span>
    </div>
    
    <div class="reels-grid" id="taskContainer">
      <!-- Dynamic Javascript Content Grid Loader -->
    </div>
  </div>

  <!-- FIXED BOTTOM NAVIGATION SYSTEM -->
  <div class="bottom-nav">
    <a href="dashboard.html" class="active"><span class="nav-icon">🏠</span>Beranda</a>
    <a href="cara.html"><span class="nav-icon">📈</span>Investasi</a>
    <a href="tim.html"><span class="nav-icon">💬</span>Forum</a>
    <a href="tentang.html"><span class="nav-icon">📋</span>Riwayat</a>
    <a href="pribadi.html"><span class="nav-icon">👤</span>Akun</a>
  </div>

  <script>
    // --- FIREBASE CONFIGURATION CONFIG & INITIALIZATION ---
    const firebaseConfig = { databaseURL: "https://admin-panel-5c204-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userPhone = localStorage.getItem('n15_user');

    // --- EMBEDDED GRAPHIC PATH SVG DICTIONARY VECTOR (Kustom Line Chart di Sebelah Kanan) ---
    const chartSVG = `
      <svg class="mini-chart" viewBox="0 0 100 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 30 Q 25 12, 50 22 T 95 10" stroke="#00E676" stroke-width="3" stroke-linecap="round" fill="none"/>
      </svg>
    `;

    // --- CENTRAL CONFIGURATION DICTIONARY MODEL & DATA ASLI ---
    const configKemitraan = {
      "Gratis": { nama: "Saham Valvora", deskripsi: "Return stabil & terpercaya", modal: 0, durasi: "24h", komisi: 500, jumlah: 3, poinPerTugas: 500, link: "https://youtu.be/h2uLMiKdyFU?si=pi99QpYPyvAdEqb7" },
      "A1":     { nama: "Saham Zentra", deskripsi: "Ekspansi modal berkala", modal: 50000, durasi: "25h", komisi: 1000, jumlah: 4, poinPerTugas: 1000, link: "https://youtu.be/tckIuiIFgLo?si=TJwiRFu3NTDsr4LQ" },
      "A2":     { nama: "Saham Apex Nova", deskripsi: "Portofolio tingkat tinggi", modal: 150000, durasi: "24h", komisi: 2000, jumlah: 5, poinPerTugas: 2000, link: "https://youtu.be/PTeKpK9Ou00?si=LImLaPmpoKcgFx8d" },
      "A3":     { nama: "Saham Orion High", deskripsi: "Imbal hasil super kuartal", modal: 500000, durasi: "48h", komisi: 4000, jumlah: 6, poinPerTugas: 4000, link: "https://youtu.be/h2uLMiKdyFU?si=pi99QpYPyvAdEqb7" },
      "A4":     { nama: "Saham Vertex Corp", deskripsi: "Investasi institusi elit", modal: 1200000, durasi: "36h", komisi: 8000, jumlah: 8, poinPerTugas: 8000, link: "https://youtu.be/h2uLMiKdyFU?si=pi99QpYPyvAdEqb7" },
      "A5":     { nama: "Saham Alpha Prime", deskripsi: "Maksimal profit eksekutif", modal: 3000000, durasi: "12h", komisi: 15000, jumlah: 10, poinPerTugas: 15000, link: "https://youtu.be/h2uLMiKdyFU?si=pi99QpYPyvAdEqb7" }
    };

    let isBalanceHidden = false;
    let rawBalanceValue = 0;

    // --- FETCH LIVE FIREBASE REALTIME REFRESH DATA USER ---
    if (userPhone) {
      db.ref('users/' + userPhone).on('value', (snapshot) => {
        const userData = snapshot.val() || {};
        rawBalanceValue = userData.points || userData.balance || 0;
        updateBalanceDisplay();
        
        // Atur akumulasi profil ringkasan berdasarkan level pengguna saat ini
        const userLevel = userData.level || "Gratis";
        if(configKemitraan[userLevel]) {
          document.getElementById('totalInvestmentText').innerText = "Rp " + configKemitraan[userLevel].modal.toLocaleString('id-ID');
          document.getElementById('dailyProfitText').innerText = "Rp " + (configKemitraan[userLevel].komisi * configKemitraan[userLevel].jumlah).toLocaleString('id-ID');
        }
      });
    }

    function updateBalanceDisplay() {
      const balanceElement = document.getElementById('userBalanceText');
      if (isBalanceHidden) {
        balanceElement.innerText = "••••••";
      } else {
        balanceElement.innerText = "Rp " + rawBalanceValue.toLocaleString('id-ID');
      }
    }

    function toggleBalanceVisibility() {
      isBalanceHidden = !isBalanceHidden;
      updateBalanceDisplay();
    }

    function filterCategory(cat) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      
      // Filter fungsional bisa dikembangkan di sini jika membagi array level
      renderLevelCards(); 
    }

    // --- 1. RENDER UTAMA: DAFTAR KARTU LEVEL INVESTASI (MOCKUP PREMIUM AS IMAGE ALTERNATIVE) ---
    function renderLevelCards() {
      document.getElementById('btnBack').style.display = "none";
      document.getElementById('sectionTitle').innerText = "TUGAS KEMITRAAN";
      
      let html = "";
      Object.keys(configKemitraan).forEach(level => {
        const item = configKemitraan[level];
        const estimatedTotalProfit = item.komisi * item.jumlah * 10; // Kalkulasi total profit proyeksi estimasi

        html += `
          <div class="reels-item" onclick="showTasksByLevel('${level}')">
            <div class="card-top">
              <div class="card-meta">
                <div class="brand-logo-container">
                  <span style="font-size: 20px; font-weight: bold; color: #1565C0;">${level[0]}</span>
                </div>
                <div class="brand-details">
                  <span class="badge-level">Mitra ${level === 'Gratis' ? 'Dasar' : level}</span>
                  <h4 class="video-title">${item.nama}</h4>
                  <p class="card-subtitle">${item.deskripsi}</p>
                </div>
              </div>
              ${chartSVG}
            </div>

            <div class="card-params">
              <div class="param-box">
                <div class="param-icon">$</div>
                <div class="param-info">
                  <span>Modal</span>
                  <span>Rp ${item.modal.toLocaleString('id-ID')}</span>
                </div>
              </div>
              <div class="param-box">
                <div class="param-icon">🕒</div>
                <div class="param-info">
                  <span>Durasi</span>
                  <span>${item.durasi}</span>
                </div>
              </div>
              <div class="param-box">
                <div class="param-icon">%</div>
                <div class="param-info">
                  <span>Komisi</span>
                  <span>Rp ${item.komisi.toLocaleString('id-ID')}</span>
                </div>
              </div>
            </div>

            <div class="card-footer">
              <div class="total-profit-box">
                <span>Total Profit</span>
                <span>Rp ${estimatedTotalProfit.toLocaleString('id-ID')}</span>
              </div>
              <button class="btn-invest">Investasi</button>
            </div>

            <div class="accordion-toggle">
              <span>Detail</span>
              <span>▼</span>
            </div>
          </div>
        `;
      });
      document.getElementById('taskContainer').innerHTML = html;
    }

    // --- 2. RENDER SUB-MENU: DAFTAR INDIVIDU SUB-TUGAS SETELAH CARD DIKLIK ---
    function showTasksByLevel(level) {
      if (!userPhone) { alert("Silakan login."); return; }

      db.ref('users/' + userPhone).once('value').then((snapshot) => {
        const userData = snapshot.val() || {};
        const completedTasks = userData.completed_tasks || {};
        const now = Date.now();
        const delay24jam = 24 * 60 * 60 * 1000;

        document.getElementById('btnBack').style.display = "block";
        document.getElementById('sectionTitle').innerText = "TUGAS - " + level.toUpperCase();
        
        const settings = configKemitraan[level];
        let html = "";
        
        for (let i = 1; i <= settings.jumlah; i++) {
          const taskId = `${level}_task_${i}`;
          const lastDone = completedTasks[taskId] || 0;
          const isLocked = (now - lastDone) < delay24jam;

          const lockClass = isLocked ? "locked" : "";
          const labelText = isLocked ? "🔒 Terkunci (24 Jam)" : "🚀 Ambil Tugas Sekarang";
          const borderStyle = isLocked ? "border-left: 4px solid #94a3b8;" : "border-left: 4px solid #00E676;";

          html += `
            <div class="reels-item ${lockClass}" style="${borderStyle}" onclick="prosesTugas('${level}', ${settings.poinPerTugas}, '${settings.link}', ${i})">
              <div class="card-top" style="margin-bottom: 0;">
                <div class="card-meta">
                  <div class="brand-logo-container" style="background: ${isLocked ? '#e2e8f0' : '#E8F5E9'}">
                    <span style="font-size: 16px;">🎬</span>
                  </div>
                  <div class="brand-details">
                    <h4 class="video-title" style="font-size: 14px;">Konten Kontrak Tugas #${i}</h4>
                    <p class="card-subtitle" style="color: #00C853; font-weight: bold;">+ Rp ${settings.poinPerTugas.toLocaleString('id-ID')}</p>
                  </div>
                </div>
                <span style="font-size: 11px; font-weight: 700; color: ${isLocked ? '#888' : '#1565C0'}">${labelText}</span>
              </div>
            </div>
          `;
        }
        document.getElementById('taskContainer').innerHTML = html;
      });
    }

    // --- 3. LOGIKA PROCESS DATA & UPDATE DATA KE FIREBASE DATABASE ---
    function prosesTugas(taskLevel, poin, link, taskIndex) {
      const taskId = `${taskLevel}_task_${taskIndex}`;
      const now = Date.now();

      db.ref('users/' + userPhone).once('value').then((snapshot) => {
        const userData = snapshot.val() || {};
        const userLevel = userData.level || "Gratis";
        const completedTasks = userData.completed_tasks || {};
        const levelOrder = ["Gratis", "A1", "A2", "A3", "A4", "A5"];
        
        // Validasi tingkatan level hak akses user
        if (levelOrder.indexOf(userLevel) < levelOrder.indexOf(taskLevel)) {
          showCustomAlert("Gagal! Level Kontrak Kemitraan Anda tidak mencukupi.");
          return;
        }

        // Validasi batasan waktu tunggu pengerjaan tugas
        const lastDone = completedTasks[taskId] || 0;
        if ((now - lastDone) < (24 * 60 * 60 * 1000)) {
          showCustomAlert("Tugas ini masih dalam masa tunggu 24 Jam!");
          return
