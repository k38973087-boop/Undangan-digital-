<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KM1997 Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0d0d0d;
    color:#fff;
}

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#151515;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
    box-shadow:0 2px 10px rgba(0,0,0,.5);
}

.logo{
    color:#FFD700;
    font-size:24px;
    font-weight:bold;
}

.menu-btn{
    font-size:24px;
    cursor:pointer;
}

.container{
    padding:80px 15px 90px;
}

.banner{
    background:linear-gradient(135deg,#1b1b1b,#2c2c2c);
    border:1px solid #FFD700;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    animation:fade .5s;
}

.banner h2{
    color:#FFD700;
    margin-bottom:10px;
}

.balance{
    background:#151515;
    border-radius:20px;
    padding:15px;
    margin-bottom:20px;
}

.action{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#FFD700;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

.btn:active{
    transform:scale(.97);
}

.section-title{
    margin-bottom:12px;
    color:#FFD700;
}

.games{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.game-card{
    background:#151515;
    border-radius:18px;
    padding:18px;
    text-align:center;
    transition:.2s;
}

.game-card:active{
    transform:scale(.96);
}

.game-icon{
    font-size:30px;
    margin-bottom:10px;
}

/* Sidebar */

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    display:none;
    z-index:999;
}

.sidebar{
    position:fixed;
    left:-270px;
    top:0;
    width:260px;
    height:100%;
    background:#151515;
    z-index:1001;
    transition:.3s;
    padding:20px;
}

.sidebar.active{
    left:0;
}

.overlay.active{
    display:block;
}

.profile{
    text-align:center;
    margin-bottom:25px;
}

.avatar{
    width:70px;
    height:70px;
    background:#FFD700;
    color:#000;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    font-size:28px;
    font-weight:bold;
}

.sidebar a{
    display:block;
    color:#fff;
    text-decoration:none;
    padding:14px;
    border-radius:12px;
    margin-bottom:8px;
    background:#222;
}

.sidebar a:hover{
    background:#333;
}

/* Bottom Nav */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#151515;
    display:flex;
    justify-content:space-around;
    padding:12px;
    border-top:1px solid #333;
}

.nav-item{
    text-align:center;
    font-size:13px;
    color:#fff;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">

<div class="profile">
    <div class="avatar" id="avatar">K</div>
    <h3 id="username">User</h3>
</div>

<a href="#">🏠 Beranda</a>
<a href="deposit.html">💰 Deposit</a>
<a href="withdraw.html">🏧 Withdraw</a>
<a href="#">🎮 Kategori Game</a>
<a href="#">📜 Riwayat</a>
<a href="#">👤 Profil</a>
<a href="#" onclick="logout()">🚪 Logout</a>

</div>

<div class="header">
    <div class="menu-btn" onclick="openMenu()">☰</div>
    <div class="logo">KM1997</div>
    <div>🔔</div>
</div>

<div class="container">

<div class="banner">
    <h2>🔥 Promo Hari Ini</h2>
    <p>Bonus deposit dan diskon top up game.</p>
</div>

<div class="balance">
    <h3>Saldo</h3>
    <h2>Rp 0</h2>

    <div class="action">
        <button class="btn"
        onclick="location.href='deposit.html'">
        Deposit
        </button>

        <button class="btn"
        onclick="location.href='withdraw.html'">
        Withdraw
        </button>
    </div>
</div>

<h3 class="section-title">Kategori Game</h3>

<div class="games">

<div class="game-card">
<div class="game-icon">🎮</div>
Mobile Legends
</div>

<div class="game-card">
<div class="game-icon">🔥</div>
Free Fire
</div>

<div class="game-card">
<div class="game-icon">⚔️</div>
PUBG Mobile
</div>

<div class="game-card">
<div class="game-icon">💎</div>
Valorant
</div>

<div class="game-card">
<div class="game-icon">🌌</div>
Genshin Impact
</div>

<div class="game-card">
<div class="game-icon">👑</div>
Honor of Kings
</div>

</div>

</div>

<div class="bottom-nav">
<div class="nav-item">🏠<br>Home</div>
<div class="nav-item">🎮<br>Game</div>
<div class="nav-item">💰<br>Wallet</div>
<div class="nav-item">👤<br>Akun</div>
</div>

<script>

if(!localStorage.getItem("user")){
    location.href="index.html";
}

let user = localStorage.getItem("user");

document.getElementById("username").innerHTML = user;

document.getElementById("avatar").innerHTML =
user.charAt(0).toUpperCase();

function openMenu(){
    sidebar.classList.add("active");
    overlay.classList.add("active");
}

overlay.onclick=function(){
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
}

function logout(){
    localStorage.clear();
    location.href="index.html";
}

</script>

</body>
  </html>
