<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mitra Nusantara - Portal Resmi</title>
  
  <!-- Meta Tags untuk Preview -->
  <meta property="og:title" content="Mitra Nusantara - Portal Investasi">
  <meta property="og:description" content="Akses portal investasi Mitra Nusantara yang aman dan terpercaya.">
  <meta property="og:image" content="logo1.png"> 
  <meta property="og:url" content="https://k38973087-boop.github.io/Undangan-digital-/">
  
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; width: 350px; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .logo { text-align: center; font-weight: bold; font-size: 24px; margin-bottom: 20px; color: #0057d9; }
    .input-group { margin-bottom: 15px; }
    input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #0057d9; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .hidden { display: none; }
    .switch { text-align: center; margin-top: 15px; font-size: 13px; color: #666; cursor: pointer; }
  </style>
</head>
<body>

<div class="card">
    <div class="logo">MITRA NUSANTARA</div>
    <div id="auth-form">
        <div class="input-group"><input type="text" id="phone" placeholder="Nomor HP (Contoh: 8123456789)"></div>
        <div class="input-group"><input type="password" id="pass" placeholder="Kata Sandi"></div>
        <div id="extra-fields">
            <div class="input-group"><input type="email" id="email" placeholder="Alamat Email (Contoh: user@mail.com)"></div>
        </div>
        <button id="btn-submit" onclick="processAuth()">Daftar Sekarang</button>
    </div>
    <div class="switch" id="switch-text" onclick="toggleAuth()">Sudah punya akun? Login</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://admin-panel-5c204-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isLogin = false;

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('extra-fields').classList.toggle('hidden', isLogin);
        document.getElementById('btn-submit').innerText = isLogin ? "Login" : "Daftar Sekarang";
        document.getElementById('switch-text').innerText = isLogin ? "Belum punya akun? Daftar" : "Sudah punya akun? Login";
    }

    function processAuth() {
        const phone = document.getElementById('phone').value.trim();
        const pass = document.getElementById('pass').value.trim();
        const email = document.getElementById('email').value.trim();

        // VALIDASI PROFESIONAL
        if (phone.length < 10 || phone.length > 13 || isNaN(phone)) {
            return alert("Nomor HP tidak valid! Gunakan 10-13 digit angka.");
        }
        if (!isLogin && !email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
            return alert("Format email tidak valid!");
        }
        if (pass.length < 6) {
            return alert("Kata sandi minimal 6 karakter.");
        }

        isLogin ? login(phone, pass) : register(phone, pass, email);
    }

    function register(phone, pass, email) {
        db.ref('users/' + phone).once('value').then(snap => {
            if (snap.exists()) return alert("Nomor HP sudah terdaftar!");
            
            db.ref('users/' + phone).set({
                phone, password: pass, email, points: 5000, level: "Gratis", joined: new Date().toISOString()
            }).then(() => {
                localStorage.setItem('n15_user', phone);
                window.location.href = 'beranda.html'; // Langsung pindah, tanpa link
            });
        });
    }

    function login(phone, pass) {
        db.ref('users/' + phone).once('value').then(snap => {
            if (snap.exists() && snap.val().password === pass) {
                localStorage.setItem('n15_user', phone);
                window.location.href = 'beranda.html'; // Langsung pindah
            } else {
                alert("Nomor atau Kata Sandi salah!");
            }
        });
    }
</script>
</body>
</html>
