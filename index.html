<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KM1997 Premium</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:#fff;
    min-height:100vh;
    background-image:
    radial-gradient(circle at top,#3a2d00 0%,#000 60%);
}

.header{
    padding:20px;
    text-align:center;
    border-bottom:1px solid rgba(255,215,0,.2);
}

.logo{
    font-size:36px;
    font-weight:bold;
    color:#FFD700;
    text-shadow:0 0 20px #FFD700;
}

.live{
    margin-top:10px;
    display:inline-block;
    padding:10px 20px;
    border-radius:50px;
    background:linear-gradient(45deg,#FFD700,#ffb700);
    color:#000;
    font-weight:bold;
}

.container{
    padding:20px;
    max-width:450px;
    margin:auto;
}

.card{
    background:#111;
    border:1px solid rgba(255,215,0,.3);
    border-radius:25px;
    padding:25px;
    box-shadow:0 0 30px rgba(255,215,0,.15);
    animation:fade .5s;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tabs button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:15px;
    background:#222;
    color:white;
    cursor:pointer;
}

.tabs button.active{
    background:#FFD700;
    color:black;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:15px;
    margin:8px 0;
    border:none;
    border-radius:15px;
    background:#222;
    color:white;
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:50px;
    margin-top:12px;
    background:linear-gradient(45deg,#FFD700,#ffb700);
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.btn:active{
    transform:scale(.97);
}

.hidden{
    display:none;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">KM1997</div>
    <div class="live">● LIVE CHAT</div>
</div>

<div class="container">

<div class="card">

<div class="tabs">
<button id="loginTab" class="active">
LOGIN
</button>

<button id="registerTab">
DAFTAR
</button>
</div>

<div id="loginBox">

<input type="text"
id="loginUser"
placeholder="Username">

<input type="password"
id="loginPass"
placeholder="Password">

<button class="btn"
onclick="login()">
MASUK
</button>

</div>

<div id="registerBox"
class="hidden">

<input type="text"
id="regUser"
placeholder="Username">

<input type="password"
id="regPass"
placeholder="Password">

<input type="password"
id="regPass2"
placeholder="Konfirmasi Password">

<select id="wallet">
<option>DANA</option>
<option>OVO</option>
<option>GoPay</option>
<option>ShopeePay</option>
<option>LinkAja</option>
<option>BCA</option>
<option>BRI</option>
<option>BNI</option>
<option>Mandiri</option>
</select>

<button class="btn"
onclick="register()">
DAFTAR SEKARANG
</button>

</div>

</div>

</div>

<script>

if(localStorage.getItem("user")){
    location.href="dashboard.html";
}

loginTab.onclick=()=>{
    loginBox.classList.remove("hidden");
    registerBox.classList.add("hidden");
    loginTab.classList.add("active");
    registerTab.classList.remove("active");
}

registerTab.onclick=()=>{
    registerBox.classList.remove("hidden");
    loginBox.classList.add("hidden");
    registerTab.classList.add("active");
    loginTab.classList.remove("active");
}

function register(){

let user=regUser.value;
let pass=regPass.value;
let pass2=regPass2.value;

if(pass!==pass2){
    alert("Password tidak sama");
    return;
}

localStorage.setItem("user",user);
localStorage.setItem("pass",pass);
localStorage.setItem("wallet",wallet.value);

location.href="dashboard.html";
}

function login(){

if(
loginUser.value==
localStorage.getItem("user")
&&
loginPass.value==
localStorage.getItem("pass")
){
location.href="dashboard.html";
}else{
alert("Login gagal");
}

}

</script>

</body>
    </html>
