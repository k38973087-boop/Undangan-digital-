<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KM1997 - Login</title>

<link rel="stylesheet" href="style.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0d0d0d;
    color:white;
}

.container{
    padding:20px;
    max-width:450px;
    margin:auto;
}

.logo{
    text-align:center;
    margin-top:40px;
    margin-bottom:20px;
}

.logo h1{
    color:#FFD700;
    font-size:35px;
}

.logo p{
    color:#aaa;
}

.card{
    background:#151515;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,215,0,.1);
}

.tabs{
    display:flex;
    margin-bottom:20px;
}

.tabs button{
    flex:1;
    padding:12px;
    border:none;
    background:#222;
    color:white;
    cursor:pointer;
}

.tabs button.active{
    background:#FFD700;
    color:black;
}

input,select{
    width:100%;
    padding:14px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    background:#222;
    color:white;
}

.btn{
    width:100%;
    padding:14px;
    background:#FFD700;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.btn:active{
    transform:scale(.97);
}

.hidden{
    display:none;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">
<h1>KM1997</h1>
<p>Game Online Store</p>
</div>

<div class="card">

<div class="tabs">
<button id="loginTab" class="active">Login</button>
<button id="registerTab">Daftar</button>
</div>

<!-- LOGIN -->

<div id="loginBox">

<input type="text" id="loginUser" placeholder="Username">

<input type="password" id="loginPass" placeholder="Password">

<button class="btn" onclick="login()">
Masuk
</button>

</div>

<!-- REGISTER -->

<div id="registerBox" class="hidden">

<input type="text" id="regUser" placeholder="Username">

<input type="password" id="regPass" placeholder="Password">

<input type="password" id="regPass2" placeholder="Konfirmasi Password">

<select id="wallet">

<option>DANA</option>
<option>OVO</option>
<option>GoPay</option>
<option>ShopeePay</option>
<option>LinkAja</option>
<option>BCA</option>
<option>BRI</option>
<option>BNI</option>
<option>Mandiri</option>

</select>

<button class="btn" onclick="register()">
Daftar Sekarang
</button>

</div>

</div>

</div>

<script>

if(localStorage.getItem("user")){
    location.href="dashboard.html";
}

const loginTab=document.getElementById("loginTab");
const registerTab=document.getElementById("registerTab");

loginTab.onclick=()=>{
    loginBox.classList.remove("hidden");
    registerBox.classList.add("hidden");

    loginTab.classList.add("active");
    registerTab.classList.remove("active");
}

registerTab.onclick=()=>{
    registerBox.classList.remove("hidden");
    loginBox.classList.add("hidden");

    registerTab.classList.add("active");
    loginTab.classList.remove("active");
}

function register(){

let user=regUser.value;
let pass=regPass.value;
let pass2=regPass2.value;

if(user==""||pass==""){
    alert("Lengkapi data");
    return;
}

if(pass!==pass2){
    alert("Password tidak sama");
    return;
}

localStorage.setItem("user",user);
localStorage.setItem("pass",pass);
localStorage.setItem("wallet",wallet.value);

alert("Pendaftaran berhasil");

location.href="dashboard.html";
}

function login(){

let user=loginUser.value;
let pass=loginPass.value;

if(
user==localStorage.getItem("user")
&&
pass==localStorage.getItem("pass")
){
location.href="dashboard.html";
}else{
alert("Login gagal");
}

}

</script>

</body>
</html>
